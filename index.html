<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wedding Invitation</title>

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: #f5e9da;
        }
        /* OPENING */
        
        .opening {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.35), rgba(0, 0, 0, 0.35)), url('DSC07534\ \(1\).JPG\ \(1\).jpeg') center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            z-index: 999;
            transition: 1.5s;
        }
        
        .opening.hide {
            opacity: 0;
            visibility: hidden;
        }
        
        .opening h4 {
            color: #fff;
            font-weight: 300;
            letter-spacing: 5px;
            margin-bottom: 15px;
            animation: fadeUp 1.5s ease;
        }
        
        .opening h1 {
            font-family: 'Cormorant Garamond', serif;
            color: white;
            font-size: 5rem;
            font-weight: 600;
            margin-bottom: 20px;
            animation: zoomIn 2s ease;
        }
        
        .opening p {
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 35px;
            animation: fadeUp 2s ease;
        }
        
        .btn-open {
            padding: 15px 38px;
            border: none;
            border-radius: 50px;
            background: #8b5e3c;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: .4s;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .25);
        }
        
        .btn-open:hover {
            transform: translateY(-4px);
            background: #6d4529;
        }
        /* VIDEO SECTION */
        
        .video-section {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            background: black;
            display: none;
            justify-content: center;
            align-items: center;
        }
        
        .video-section video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        /* THANK YOU */
        
        .thankyou {
            position: fixed;
            inset: 0;
            width: 100%;
            height: 100vh;
            background: linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)), url('https://images.unsplash.com/photo-1522673607200-164d1b6ce486?q=80&w=1600&auto=format&fit=crop') center/cover;
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            padding: 20px;
            animation: fadeIn 2s ease;
        }
        
        .thankyou h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 5rem;
            color: white;
            margin-bottom: 15px;
        }
        
        .thankyou p {
            color: rgba(255, 255, 255, 0.85);
            max-width: 700px;
            line-height: 1.8;
        }
        
        .replay-btn {
            margin-top: 35px;
            padding: 14px 35px;
            border-radius: 50px;
            border: none;
            background: #8b5e3c;
            color: white;
            cursor: pointer;
            transition: .3s;
        }
        
        .replay-btn:hover {
            background: #6d4529;
        }
        /* ANIMATION */
        
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes zoomIn {
            from {
                opacity: 0;
                transform: scale(.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        /* MOBILE */
        
        @media(max-width:768px) {
            .opening h1,
            .thankyou h1 {
                font-size: 3rem;
            }
            .opening p,
            .thankyou p {
                font-size: 14px;
            }
        }
        
        .maps-btn {
            margin-top: 20px;
            padding: 14px 35px;
            background: #d9c2a3;
            color: #4b2e2b;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: .3s;
            display: inline-block;
        }
        
        .maps-btn:hover {
            background: #c7aa85;
            transform: translateY(-3px);
        }
    </style>
</head>

<body>

    <!-- OPENING -->

    <section class="opening" id="opening">

        <h4>THE WEDDING OF</h4>

        <h1>Kaniya & Wandi</h1>

        <p>Special Invitation For You</p>

        <button class="btn-open" onclick="openInvitation()">
            Buka Undangan
        </button>

    </section>

    <!-- VIDEO -->

    <section class="video-section" id="videoSection">

        <!-- GANTI DENGAN VIDEO KAMU -->
        <video id="weddingVideo">

            <source src="animasi undangan.mp4" type="video/mp4">

        </video>

    </section>

    <!-- THANK YOU -->

    <section class="thankyou" id="thankyou">

        <h1>Thank You</h1>

        <p>
            Merupakan suatu kehormatan dan kebahagiaan bagi kami apabila Bapak/Ibu/Saudara/i berkenan hadir dan memberikan doa restu untuk hari bahagia kami.
        </p>

        <button class="replay-btn" onclick="replayVideo()">
            Putar Ulang
        </button>
        <a href="https://maps.app.goo.gl/6hV9ZsJ9UYdJ4Dhr9" target="_blank" class="maps-btn">

    Lihat Lokasi Acara

</a>


    </section>

    <script>
        const opening = document.getElementById('opening');
        const videoSection = document.getElementById('videoSection');
        const video = document.getElementById('weddingVideo');
        const thankyou = document.getElementById('thankyou');

        function openInvitation() {

            opening.classList.add('hide');

            setTimeout(() => {

                videoSection.style.display = 'flex';

                video.play();

            }, 1200);
        }

        video.onended = function() {

            videoSection.style.display = 'none';

            thankyou.style.display = 'flex';
        }

        function replayVideo() {

            thankyou.style.display = 'none';

            videoSection.style.display = 'flex';

            video.currentTime = 0;

            video.play();
        }
    </script>

</body>

</html>
